 1:B+"hf_20260627_205150_0555fe17-7641-4fea-8cf4-23388c6f86bf.mp3",

 21:B+"hf_20260627_205201_9b652ef3-e6a8-49d1-bc27-8d0da1bdc60d.mp3",

const S=[
 ["hf_20260627_204907_b1265fde-d53f-4f06-9327-24d0ec38d0d4","The body arrived during a thunderstorm."],
 ["hf_20260627_204911_6ab22940-0496-4727-ac86-15ecffa62cba","Beneath the sheet — a click. Like teeth."],
 ["hf_20260627_204942_6aabb4e6-a0fe-4fcd-9785-be7d163dcad0","“Don’t leave her face uncovered.”"],
 ["hf_20260627_204944_64dfea10-f2df-4166-bfdd-5b2f8c2ad4f7","Jane Doe. No ID. No crash. No footprints."],
 ["hf_20260627_204916_ddc7bafb-47a7-463c-9e1e-a1b8517b91b2","Her fingers open. The mirror falls."],
 ["hf_20260627_204918_70dace8c-cd0f-48df-8276-f0c8485825a6","GIVE HIM BLOOD. The lights flicker."],
 ["hf_20260627_204919_84706fe8-5aec-47fd-b1fc-e17e79e7123d","Behind the wallpaper, something pushes."],
 ["hf_20260627_204947_22e264fd-6e2c-4936-a86b-24583fe9bace","The house is changing. The hall is longer."],
 ["hf_20260627_204949_a657823c-dfb6-4bb7-bc74-e361e5c2b23d","Someone is breathing behind her."],
 ["hf_20260627_205222_58ce1512-abaf-4ff3-b400-13f72a679604","In the glass: their mother, and a hooded boy."],
 ["hf_20260627_204954_e5e63243-bc39-42ae-b4e9-da27704274ea","Daniel’s eyes are black from edge to edge."],

 ["hf_20260627_204958_82364eba-e869-41dd-b7a3-c90a5d87b804","The corpse’s eyes are open. “The invitation.”"],
 ["hf_20260627_205000_780e299a-84d8-4227-818c-111fb621ed93","“Not in. Under.” The door opens itself."],
 ["hf_20260627_205020_0ce83d19-6bdd-4070-9042-af417afdca69","They go down together."],
 ["hf_20260627_205022_257e7d91-d912-4b0f-96e0-330c22122f23","“Daniel was weak. Samuel was strong. We chose.”"],
 ["hf_20260627_205024_a9e3f5f2-8ea5-448a-bf36-f556d664cd9b","The wall cracks. Something breathes."],

 ["hf_20260627_205029_80b37dd8-2f7c-4d97-a94f-2dac5ba7ad4b","“I preserved you.”"],

 ["hf_20260627_205033_5058def9-26f4-4601-abba-0fa3cc902275","“We live because he died.” The mirror shatters."],
 ["hf_20260627_205035_9c6b5a33-b1a2-4cdf-ae46-50d99a23a26f","A month later, the machines come."],
 ["hf_20260627_205037_4049b53a-9d7d-4221-b35b-e2bc9c7cc6e3","Thirty-seven. Most of them infants."],
 ["hf_20260627_205040_ae2311ab-f672-4921-a8c1-614afcd00cd9","She buried him. She did not pray."],
 ["hf_20260627_205100_ac992d7e-08e4-4e82-9165-be8483c0c622","“Your brother still owes me.”"],
];
const vid=document.getElementById('vid'), cap=document.getElementById('cap'),
      card=document.getElementById('card'), prog=document.getElementById('prog'),
      hud=document.getElementById('hud'), startEl=document.getElementById('start');
let i=0, curVO=null;
function show(idx){
  if(idx>=S.length){ return finish(); }
  i=idx; hud.textContent="Shot "+(idx+1)+" / "+S.length;
  prog.style.width=((idx)/S.length*100)+"%";
  card.style.display="none"; vid.style.display="";
  vid.src=B+S[idx][0]+".mp4"; cap.textContent=S[idx][1];
  vid.play().catch(()=>{});
  if(curVO){curVO.pause();curVO=null;}
  if(VO[idx+1]){ curVO=new Audio(VO[idx+1]); curVO.volume=1.0; curVO.play().catch(()=>{}); }
}
vid.addEventListener('ended',()=>show(i+1));
vid.addEventListener('error',()=>show(i+1));
function finish(){
  prog.style.width="100%"; vid.style.display="none"; cap.textContent="";
  card.src=END; card.style.display=""; hud.textContent="";
  if(curVO){try{curVO.pause()}catch(e){}}
}
startEl.addEventListener('click',()=>{ startEl.style.display="none"; show(0); });
