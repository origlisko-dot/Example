 ["hf_20260627_204907_b1265fde-d53f-4f06-9327-24d0ec38d0d4","The body arrived during a thunderstorm."],
 ["hf_20260627_204911_6ab22940-0496-4727-ac86-15ecffa62cba",""],
 ["hf_20260627_204942_6aabb4e6-a0fe-4fcd-9785-be7d163dcad0","DRIVER: “…Don’t leave her face uncovered.”"],
 ["hf_20260627_204944_64dfea10-f2df-4166-bfdd-5b2f8c2ad4f7","Jane Doe. No ID. No crash. No footprints."],
 ["hf_20260627_204916_ddc7bafb-47a7-463c-9e1e-a1b8517b91b2","Her fingers open. The mirror falls."],

const vid=document.getElementById('vid'),cap=document.getElementById('cap'),card=document.getElementById('card'),
      prog=document.getElementById('prog'),hud=document.getElementById('hud'),startEl=document.getElementById('start'),
      music=document.getElementById('music');
let i=0,active=[];
function clearVoices(){active.forEach(a=>{try{a.pause()}catch(e){}});active=[];}
function show(idx){
  if(idx>=S.length)return finish();
  i=idx;hud.textContent="Shot "+(idx+1)+" / "+S.length;prog.style.width=(idx/S.length*100)+"%";
  card.style.display="none";vid.style.display="";
  vid.src=B+S[idx][0]+".mp4";cap.textContent=S[idx][1];vid.play().catch(()=>{});
  clearVoices();
  const lines=DLG[idx+1];
  if(lines)lines.forEach(([url,delay])=>{const a=new Audio(url);a.volume=1.0;active.push(a);
     setTimeout(()=>{a.play().catch(()=>{});},delay);});
}
vid.addEventListener('ended',()=>show(i+1));
vid.addEventListener('error',()=>show(i+1));
function finish(){prog.style.width="100%";vid.style.display="none";cap.textContent="";
  card.src=END;card.style.display="";hud.textContent="";clearVoices();
  let v=music.volume;const f=setInterval(()=>{v-=0.05;if(v<=0){music.pause();clearInterval(f);}else music.volume=v;},150);}
startEl.addEventListener('click',()=>{startEl.style.display="none";
  music.volume=0.35;music.play().catch(()=>{});show(0);});
